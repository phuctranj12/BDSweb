<html lang="vi">

<head>
  <meta charset="utf-8" />
  <!-- SVG favicon; logo192.png is the fallback for browsers without SVG icon support. -->
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
  <link rel="alternate icon" type="image/png" href="%PUBLIC_URL%/logo192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />

  <title>Bất Động Sản Trường Phát | Khu nhà ở Thôn Đại Vi, Bắc Ninh</title>
  <meta name="description"
    content="Công ty TNHH Trường Phát Từ Sơn — chủ đầu tư Dự án Khu nhà ở thôn Đại Vi, xã Đại Đồng, huyện Tiên Du, Bắc Ninh. Mua bán, môi giới, tư vấn đầu tư và thẩm định giá bất động sản." />

  <!-- Speed up the webfont handshake before CSS is even parsed. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fonts load here (not via CSS @import) so the request starts during HTML
       parse. Fraunces carries the identity: opsz 9..144, SOFT 0..100 and WONK
       0..1 are all exercised (the .u-wonk flourish needs italic + SOFT 100 +
       WONK 1), so the axis range is kept full. display=swap avoids invisible
       text. Be Vietnam Pro ships the vietnamese subset. -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:ital,opsz,SOFT,WONK,wght@0,9..144,0..100,0..1,300..900;1,9..144,0..100,0..1,300..900&display=swap"
  />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Bất Động Sản Trường Phát" />
  <meta property="og:description"
    content="Dự án Khu nhà ở thôn Đại Vi, xã Đại Đồng, huyện Tiên Du, Bắc Ninh. Pháp lý minh bạch, hạ tầng hoàn thiện." />
  <meta property="og:locale" content="vi_VN" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
</head>
